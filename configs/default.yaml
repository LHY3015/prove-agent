# LLM transport. Tests force provider=fake (no API key, no network).
# Real-LLM runs (evals --live) use openai_compat against Qwen / Model Studio international.
llm:
  provider: openai_compat            # openai_compat | fake (tests force this)
  base_url: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
  # workspace-scoped form: https://{WorkspaceId}.ap-southeast-1.maas.aliyuncs.com/compatible-mode/v1
  # API key via env DASHSCOPE_API_KEY (region-scoped)

# Per-role model tiering (single source of truth). IDs verified against the Model Studio
# international catalog.
model:
  # qwen-plus, not the cheaper qwen-turbo: measured over 420 documents, turbo returns the tax
  # *rate* off a "Tax 8.25% 365.11" line where the schema declares a money amount, which costs
  # half the validation pass rate (0.507 vs 1.000) to save ~20% tokens. Override per run with
  # `--extraction-model`.
  extraction: qwen-plus
  synthesis: qwen-coder-plus         # coder-class; writes the skill source
  # reserved: attribution is fully deterministic today and issues no LLM call. This entry is the
  # model the ambiguous-batch escalation would use if it is ever built.
  attribution: qwen-max

synthesis_trigger: 10

admission:
  holdout_frac: 0.3
  min_holdout: 3
  f1_threshold: 0.95
  max_rejections: 3

trial_docs: 10

monitor:
  window: 20
  failure_rate_threshold: 0.2
  confidence_floor: 0.3
  min_window: 10          # fast path won't fire until a young skill has served this many docs
  min_failures: 3         # absolute failure floor for the fast path (robust to noise on young skills)

# discounted-Beta confidence ledger (effective N ~= 1/(1-decay) ~= 33)
ledger:
  prior: 1
  decay: 0.97

# attribution (A3 only). A fired monitor batch is classified to a root cause; only skill-fault
# failures charge the ledger. conf_tau: route_confidence below this is a mis-delivery (exact
# hits ~1.0, cross-format Jaccard ~0.4, so the gap is wide). drift_prefix_frac: clean fraction of
# the batch that must precede the first residual failure to read as abrupt onset (drift vs defect).
attribution:
  conf_tau: 0.9
  drift_prefix_frac: 0.4
  # input_integrity at/below this marks the DOCUMENT as unreadable (born-digital extraction
  # scores 1.0). Peeled before routing: degraded header tokens also depress route confidence,
  # so the doc must be charged to the root cause, not to the symptom.
  integrity_tau: 0.95
  ambiguous_meta_review: 2   # consecutive ambiguous verdicts before flagging for meta-review

sandbox:
  cpu_seconds: 5
  mem_mb: 512

# A0|A1|A2|A3 — toggles admission gate / monitoring / attribution
ablation:
  mode: A3

# per-model in/out $/Mtok — fill from the intl pricing page before --live evals
costs: {}
